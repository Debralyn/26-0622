<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Hotels and Travel</title>
    <style>
        /* This adds the background color and styling within the HTML file */
        body {
            background-color: #f0f4f8; /* Light green background */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #003049; /* Light Green */
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #d62828;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .contact-card {
            background-color: white;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #005f8d;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>Contact Our Travel Experts</h1>
        <p>We help you find the best stays in Kenya</p>
    </header>


    <main>
        <section class="contact-card">
            <h2>Send us a Message</h2>
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Inquiry Type</label>
                    <select id="subject" name="subject">
                        <option value="booking">Hotel Booking</option>
                        <option value="tour">Tour Package</option>
                        <option value="general">General Question</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit">Submit Inquiry</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hotels and Travel. All rights reserved.</p>
    </footer>

</body>
</html>
