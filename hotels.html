<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels & Travel - Explore Kenya</title>
    <style>
        /* 1. Page Background and Font */
        body {
            background-color: #e8f5e9; /* Light Green */
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 0;
            color: #1b5e20; /* Dark Green Text */
        }

        header {
            background-color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 5px solid #4caf50;
        }

        nav {
            background-color: #2e7d32;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            border-bottom: 2px solid #a5d6a7;
            padding-bottom: 10px;
            margin-top: 50px;
        }

        /* 2. Image Gallery Styling */
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .image-gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 3. Video Grid Styling (6 Videos) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 5px;
            border: none;
        }

        footer {
            background-color: #1b5e20;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>

    <nav>
        <a href="index.html"</a>

            <div class="video-card">

                    <iframe src="https://www.youtube.com/embed/A-yYTkfrHR0"></iframe>
                </div>
                <p style="text-align:center">Mountain Hiking</p>
            </div>

            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/A-yYTkfrHR0"></iframe>

                <p style="text-align:center">City Nightlife</p>

            <div class="video-card">

            <div class="video-card">

                    <iframe src="https://www.youtube.com/embed/A-yYTkfrHR0"></iframe>
                </div>
                <p style="text-align:center">Luxury Stays</p>
            </div>

        </div>
    </div>

    <footer>

    </footer>

</body>
</html>
