    <style>

        body {
            background-color: #90EE90; /* LightGreen hex code */

        }

        .btn {
            display: inline-block;
            background-color: #2d5a27;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
